name: Update Players Data

on:
  # Excel file changes
  push:
    paths:
      - 'backend/data/premier_league_players_merged_final.xlsx'
  
  # Manual trigger
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      # Convert Excel to JSON
      - name: Generate players.json from Excel
        working-directory: backend
        run: |
          python simple_generate.py

      # Commit if changed
      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/players.json
          if git diff --cached --quiet; then
            echo "players.json unchanged - nothing to commit"
          else
            git commit -m "chore: update players.json from Excel file [skip ci]"
            git push
          fi
