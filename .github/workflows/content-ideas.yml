name: Generate Content Ideas

on:
  # 每天北京时间 09:00（UTC 01:00）自动生成一次
  schedule:
    - cron: '0 1 * * *'

  # 随时手动触发
  workflow_dispatch:
    inputs:
      top:
        description: '参考最新几条新闻'
        required: false
        default: '15'
      dry_run:
        description: '是否 dry-run（不发送 Telegram）'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: none

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Generate and send content ideas
        working-directory: backend
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TOP="${{ github.event.inputs.top || '15' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS="--top=${TOP}"
          if [ "${DRY_RUN}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          python content_ideas.py ${ARGS}
