name: Fetch Sports News

on:
  # 每小时整点触发
  schedule:
    - cron: '0 * * * *'

  # 手动触发（可指定小时数）
  workflow_dispatch:
    inputs:
      hours:
        description: '抓取过去多少小时内的新闻'
        required: false
        default: '2'
      dry_run:
        description: '是否 dry-run（不发送 Telegram）'
        required: false
        default: 'false'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # 需要写入 news.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch and send news
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOURS="${{ github.event.inputs.hours || '2' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS="--hours=${HOURS}"
          if [ "${DRY_RUN}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          python fetch_news.py ${ARGS}

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/news.json backend/data/news_sent_guids.json
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: auto-update news [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
