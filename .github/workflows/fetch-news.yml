name: Fetch Sports News

on:
  # 每小时整点触发
  schedule:
    - cron: '0 * * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      hours:
        description: '抓取过去多少小时内的新闻'
        required: false
        default: '2'
      dry_run:
        description: '是否 dry-run（不发送 Telegram / 不调用 GPT）'
        required: false
        default: 'false'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # ── Step 1: 抓取新闻，输出 has_new flag ─────────────────────────────────
      - name: Fetch and send news
        id: fetch
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOURS="${{ github.event.inputs.hours || '2' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS="--hours=${HOURS}"
          if [ "${DRY_RUN}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          python fetch_news.py ${ARGS}

      # ── Step 2: 有新内容才生成选题建议 ──────────────────────────────────────
      - name: Generate content ideas
        if: steps.fetch.outputs.has_new == 'true'
        working-directory: backend
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS=""
          if [ "${DRY_RUN}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python content_ideas.py ${ARGS}

      # ── Step 3: 提交更新的文件 ───────────────────────────────────────────────
      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/news.json frontend/public/data/news_archive.json backend/data/news_sent_guids.json
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: auto-update news [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
