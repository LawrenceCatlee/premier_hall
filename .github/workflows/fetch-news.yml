name: Fetch Sports News

on:
  # 每天三次：北京时间 08:00 / 14:00 / 21:00（UTC 00:00 / 06:00 / 13:00）
  schedule:
    - cron: '0 0 * * *'    # 北京时间 08:00
    - cron: '0 6 * * *'    # 北京时间 14:00
    - cron: '0 13 * * *'   # 北京时间 21:00

  # 手动触发（可指定小时数）
  workflow_dispatch:
    inputs:
      hours:
        description: '抓取过去多少小时内的新闻'
        required: false
        default: '8'
      dry_run:
        description: '是否 dry-run（不发送 Telegram）'
        required: false
        default: 'false'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: none   # 只读取，不需要写入

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch and send news
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          HOURS="${{ github.event.inputs.hours || '8' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS="--hours=${HOURS}"
          if [ "${DRY_RUN}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          python fetch_news.py ${ARGS}
